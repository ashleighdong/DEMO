<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Render WebSocket Chat</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
		<style>
			:root { color-scheme: light dark; }
			* { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji"; }
			body { display: grid; place-items: center; background: canvas; color: canvastext; }
			.app { width: min(960px, 100%); height: min(720px, 100%); display: grid; grid-template-rows: auto 1fr auto; border: 1px solid color-mix(in oklab, canvastext 10%, transparent); border-radius: 12px; overflow: hidden; background: color-mix(in oklab, canvas 96%, canvastext 4%); }
			header { padding: 16px 20px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; background: color-mix(in oklab, canvas 92%, canvastext 8%); }
			.status { font-size: 12px; opacity: .8; }
			.messages { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
			.msg { padding: 10px 12px; border-radius: 10px; max-width: 75%; width: fit-content; box-shadow: 0 1px 1px rgba(0,0,0,.05); }
			.msg.me { align-self: flex-end; background: #4f46e5; color: white; }
			.msg.other { align-self: flex-start; background: color-mix(in oklab, canvas 85%, canvastext 15%); }
			.msg.system { align-self: center; font-size: 12px; opacity: .8; background: transparent; box-shadow: none; }
			form { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px; background: color-mix(in oklab, canvas 92%, canvastext 8%); }
			input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid color-mix(in oklab, canvastext 15%, transparent); background: canvas; color: canvastext; }
			button { padding: 12px 16px; border-radius: 8px; border: 0; background: #4f46e5; color: white; font-weight: 600; cursor: pointer; }
			button:disabled { opacity: .6; cursor: not-allowed; }
		</style>
	</head>
	<body>
		<div class="app">
			<header>
				<div>Chatroom</div>
				<div class="status" id="status">Connecting…</div>
			</header>
			<main id="messages" class="messages" aria-live="polite"></main>
			<form id="form">
				<input id="input" type="text" placeholder="Type a message…" autocomplete="off" required />
				<button id="send" type="submit">Send</button>
			</form>
		</div>
		<script type="module" src="./main.js"></script>
	</body>
	</html>
